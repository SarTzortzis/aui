<label class="ui-checkbox" [class.disabled]="disabled">

  <input type="checkbox" [checked]="value" [disabled]="disabled" (change)="toggle()" />

  <span class="checkbox-box">
    @if (value) {
    <ui-icon size="small">
      ✓
    </ui-icon>
    }
  </span>

  <span class="checkbox-label">
    <ng-content></ng-content>
  </span>

</label>
