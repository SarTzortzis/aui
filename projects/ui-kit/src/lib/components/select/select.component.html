<div class="ui-select">

  @if (label) {
  <label>{{ label }}</label>
  }

  <button type="button" class="select-trigger" (click)="toggle()">

    {{ selectedLabel }}

  </button>

  @if (isOpen) {

  <div class="select-menu">

    @for (option of options; track option.value) {

    <button type="button" class="select-option" (click)="select(option)">

      {{ option.label }}

    </button>

    }

  </div>

  }

</div>
