<div class="ui-select" uiClickOutside (clickOutside)="close()">

  @if (label) {
  <label class="select-label">
    {{ label }}
  </label>
  }

  <button type="button" class="select-trigger" [disabled]="disabled" (click)="toggle()">

    <span class="select-value" [class.placeholder]="!selectedOption">

      {{ selectedOption?.label ?? placeholder }}

    </span>

    <span class="select-arrow">
      ▼
    </span>

  </button>

  @if (isOpen) {

  <div class="select-menu">

    @for (option of options; track option.value) {

    <button type="button" class="select-option" [class.selected]="value === option.value" [disabled]="option.disabled"
      (click)="select(option)">

      {{ option.label }}

    </button>

    }

  </div>

  }

</div>
